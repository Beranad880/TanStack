name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './tanstack/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ./tanstack

      - name: Run Lint
        run: npm run lint
        working-directory: ./tanstack

      - name: Run Build
        run: npm run build
        working-directory: ./tanstack

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
          workingDirectory: ./tanstack
